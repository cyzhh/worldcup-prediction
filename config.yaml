# 世界杯预测项目全局配置（改参优先改此文件，无需动代码）

paths:
  data_dir: data
  output_dir: output
  openfootball_dir: data/openfootball
  logs_dir: logs
  worldcup_db: data/worldcup_db.json
  backtest_report: output/backtest_report.json
  model_calibration: output/model_calibration.json
  predictions: output/predictions.json

sync:
  user_agent: worldcup-predictor/1.0
  timeout_sec: 60
  retries: 3
  retry_backoff_sec: 2.0
  live_refresh:
    - 2026/worldcup.json
    - 2026--usa/cup.txt
  sources:
    2026--usa/cup.txt: https://raw.githubusercontent.com/openfootball/worldcup/master/2026--usa/cup.txt
    2026/worldcup.json: https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json
    2022--qatar/cup.txt: https://raw.githubusercontent.com/openfootball/worldcup/master/2022--qatar/cup.txt
    2018--russia/cup.txt: https://raw.githubusercontent.com/openfootball/worldcup/master/2018--russia/cup.txt
    2014--brazil/cup.txt: https://raw.githubusercontent.com/openfootball/worldcup/master/2014--brazil/cup.txt
    2010--south-africa/cup.txt: https://raw.githubusercontent.com/openfootball/worldcup/master/2010--south-africa/cup.txt
    2006--germany/cup.txt: https://raw.githubusercontent.com/openfootball/worldcup/master/2006--germany/cup.txt
    2002--south-korea-n-japan/cup.txt: https://raw.githubusercontent.com/openfootball/worldcup/master/2002--south-korea-n-japan/cup.txt
    1998--france/cup.txt: https://raw.githubusercontent.com/openfootball/worldcup/master/1998--france/cup.txt
    1994--usa/cup.txt: https://raw.githubusercontent.com/openfootball/worldcup/master/1994--usa/cup.txt
    1990--italy/cup.txt: https://raw.githubusercontent.com/openfootball/worldcup/master/1990--italy/cup.txt
    1986--mexico/cup.txt: https://raw.githubusercontent.com/openfootball/worldcup/master/1986--mexico/cup.txt

logging:
  level: INFO
  file: logs/worldcup.log
  console: true

backtest:
  elo_prior_start_id: 1986--mexico
  eval_start_id: 1998--france
  eval_end_id: 2022--qatar
  upset_elo_threshold: 120.0

betting:
  stake_per_bet: 50.0
  bankroll_per_tournament: 2000.0
  book_margin: 0.07
  reserve: 200.0
  tiered:
    strong_strength: 0.12
    medium_strength: 0.06
    ou_min_strong: 0.60
    ou_min_medium: 0.55
    draw_override: 0.30
    max_strong_matches: 10
    max_medium_matches: 5
    skip_weak_1x2: true
  typical_odds:
    wdl_strong: 1.6
    wdl_medium: 1.75
    asian: 1.9
    over_under: 1.85

elo:
  k_factor: 32
  home_adv: 65

model:
  group_stage_draw_base: 0.22
  group_stage_round1_draw_boost: 0.04
  under_25_base: 0.55
  elo_blend_strong: 0.68
  elo_blend_close: 0.52
  historical_shrinkage: 0.12
  upset_elo_threshold: 120.0
  upset_prob_boost: 0.035
  favorite_draw_penalty: 0.015
  dixon_coles_rho: -0.08
  player_prob_weight: 0.05
  host_elo_bonus: 35.0
  draw_mass_blend: 0.40
  draw_elo_sensitivity: 0.08
  draw_form_sensitivity: 0.04
  poisson_round_decay: 0.03
  dixon_rho_close: -0.112
  dixon_rho_strong: -0.048
  player_top5_weight: 0.08
  under_25_round1_boost: 0.04
  under_25_close_boost: 0.03

pipeline:
  expected_group_matches: 72
