name: 测试

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装开发依赖
        run: pip install -r requirements-dev.txt

      - name: pytest
        run: pytest tests/ -q
