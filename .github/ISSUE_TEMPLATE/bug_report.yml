---
name: Bug 报告
description: 数据同步、构建流水线或页面展示问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: 环境
      placeholder: "本地 / GitHub Actions / Pages"
  - type: textarea
    id: logs
    attributes:
      label: 日志片段
      description: 如有 `logs/worldcup.log` 或 CI 输出请粘贴
